model:
  max_points: 20000
  emb_dim: 128
  center_offset:
    enable: true
    hidden: 256
train:
  batch_size: 6
  lr: 0.0005
  epochs: 12
loss:
  delta_v: 0.45
  delta_d: 1.3
  lambda_disc: 0.5
  center_offset_weight: 0.1
cluster:
  log_stats: true
  eps: 0.42
  min_samples: 60
  split_large:
    enable: true
    size_threshold: 1600
    eps_scale:
    - 0.36
    - 0.26
    - 0.18
    min_samples:
    - 50
    - 32
    - 20
    max_iter: 5
    kmeans:
      enable: true
      min_size: 500
      min_ratio: 0.12
      min_sep: 0.7
      max_iter: 60
    jaws:
      lower:
        size_threshold: 900
        eps_scale:
        - 0.34
        - 0.24
        - 0.16
        min_samples:
        - 36
        - 24
        - 14
        max_iter: 5
        kmeans:
          enable: true
          min_size: 220
          min_ratio: 0.1
          min_sep: 0.45
          max_iter: 70
  subsample:
    max_points: 60000
    seed: 123
  normalize_points:
    center:
      enable: true
    scale:
      enable: true
      method: std
      axis_weights:
      - 1.0
      - 1.0
      - 2.0
  merge_small:
    enable: true
    distance: 2.4
data:
  root: data/sample_npz
  manifest: data/manifests/case_catalog.csv
  train_split: train
  val_split: val
  num_workers: 0
  use_cached: true
  cache_to_npz: false
  limit_train_files: 0
  limit_val_files: 0
