# Stage 1 v4: Contrastive Boundary Learning
# PointNet2Lite + HeadSem2 + HeadContrastive (SupCon on boundary)
# Warm start from v2 best checkpoint
seed: 42

model:
  backbone: pointnet2_lite
  feature_dim: 128
  max_points: 16000
  feat:
    knn: 16
    add_curvature: true
    add_normal_var: true
    add_density: true

train:
  batch_size: 1
  lr: 0.0005
  epochs: 120
  ckpt_dir: ckpts
  ema_decay: 0.0

scheduler:
  type: cosine
  warmup_epochs: 5
  min_lr: 0.000005

loss:
  class_weight_bg: 1.0
  class_weight_tooth: 2.5
  lambda_dice: 2.5
  lambda_boundary: 2.0
  use_lovasz: false
  use_focal: true
  focal_gamma: 2.0
  focal_alpha: 0.75
  # Contrastive Boundary Learning
  use_contrastive: true
  lambda_contrastive: 0.5
  contrast_dim: 64
  contrast_n_sample: 1024
  contrast_temperature: 0.1
  contrast_warmup_epochs: 5

augment:
  rotate: true
  rotate_range: 180
  jitter: true
  jitter_std: 0.003
  jitter_clip: 0.02
  flip: true
  mirror: true
  mirror_prob: 0.5
  boundary_oversample: 3.0

data:
  root: data/sample_npz
  manifest: data/manifests/case_catalog_rebalanced.csv
  train_split: train
  val_split: val
  test_split: test
  num_workers: 2
  use_cached: true
  cache_to_npz: false
  limit_train_files: 1000
  limit_val_files: 100
