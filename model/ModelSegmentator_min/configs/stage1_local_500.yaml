seed: 42
model:
  backbone: pointnet2_lite
  feature_dim: 128
  max_points: 16000
  feat:
    knn: 16
    radius_mm: 1.0
    add_curvature: true
    add_normal_var: true
    add_density: true
train:
  batch_size: 1
  lr: 0.001
  epochs: 50
  ckpt_dir: ckpts
  ema_decay: 0.0
  resume: ckpts/stage1_last.pth
scheduler:
  type: cosine
  warmup_epochs: 5
  min_lr: 0.00001
loss:
  class_weight_bg: 1.0
  class_weight_tooth: 2.5
  lambda_dice: 2.5
  lambda_boundary: 2.0
  use_lovasz: false
  use_focal: true
  focal_gamma: 2.0
  focal_alpha: 0.75
augment:
  rotate: true
  rotate_range: 180
  jitter: true
  jitter_std: 0.003
  flip: true
  mirror: true
  mirror_prob: 0.5
  scale: true
  scale_range: [0.9, 1.1]
  dropout: 0.02
data:
  root: data/sample_npz
  manifest: data/manifests/local_500.csv
  train_split: train
  val_split: val
  num_workers: 0
  use_cached: true
