# Stage 1 v4b: Boundary Dice + OHEM (batch_size=1 compatible)
# PointNet2Lite + HeadSem2 + Boundary-focused losses
# Warm start from v2 best checkpoint
seed: 42

model:
  backbone: pointnet2_lite
  feature_dim: 128
  max_points: 16000
  feat:
    knn: 16
    add_curvature: true
    add_normal_var: true
    add_density: true

train:
  batch_size: 1
  lr: 0.0001
  epochs: 120
  ckpt_dir: ckpts
  ema_decay: 0.0

scheduler:
  type: cosine
  warmup_epochs: 5
  min_lr: 0.000001

loss:
  class_weight_bg: 1.0
  class_weight_tooth: 2.5
  lambda_dice: 2.5
  lambda_boundary: 2.0
  use_lovasz: false
  use_focal: true
  focal_gamma: 2.0
  focal_alpha: 0.75
  # Contrastive disabled
  use_contrastive: false
  # Boundary-focused losses
  use_boundary_dice: true
  lambda_boundary_dice: 2.0
  use_boundary_ohem: true
  lambda_boundary_ohem: 1.0
  ohem_ratio: 0.5

augment:
  rotate: true
  rotate_range: 180
  jitter: true
  jitter_std: 0.003
  jitter_clip: 0.02
  flip: true
  mirror: true
  mirror_prob: 0.5
  boundary_oversample: 3.0

data:
  root: data/sample_npz
  manifest: data/manifests/case_catalog_rebalanced.csv
  train_split: train
  val_split: val
  test_split: test
  num_workers: 2
  use_cached: true
  cache_to_npz: false
  limit_train_files: 1000
  limit_val_files: 100
