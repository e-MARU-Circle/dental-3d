# Stage1 Experiment E1 — baseline reproduction
model:
  in_channels: 12
  max_points: 40000
  feat:
    knn: 32
    radius_mm: 1.0
    add_curvature: true
    add_normal_var: true
    add_density: true

train:
  batch_size: 12
  lr: 0.0005
  epochs: 40
  scheduler:
    type: cosine
    warmup_epochs: 4
    min_lr: 5e-5
  ema_decay: 0.0
  run_tag: stage1_e1_baseline

loss:
  lambda_boundary: 3.5
  lambda_dice: 1.2
  class_weight_bg: 1.0
  class_weight_tooth: 3.5

augment:
  rotate: true
  jitter: true
  flip: true
  dropout: 0.0

data:
  root: data/sample_npz
  num_workers: 0
  use_cached: true
  cache_to_npz: false
  train_split: train
  val_split: val
  hardcase_roots:
    - data/hardcases
    - data/hardcases_fn
  manual_override_tags: manual_override_pass1
