model:
  max_points: 20000
  emb_dim: 128
  center_offset:
    enable: true
    hidden: 256
train:
  batch_size: 6
  lr: 0.0005
  epochs: 12
loss:
  delta_v: 0.45
  delta_d: 1.3
  lambda_disc: 0.5
  center_offset_weight: 0.1
cluster:
  log_stats: true
  eps: 0.65
  min_samples: 220
  split_large:
    enable: true
    size_threshold: 5500
    eps_scale:
    - 0.58
    - 0.42
    - 0.28
    min_samples:
    - 150
    - 95
    - 65
    max_iter: 3
    kmeans:
      enable: true
      min_size: 3000
      min_ratio: 0.12
      min_sep: 1.0
      max_iter: 30
    jaws:
      lower:
        size_threshold: 2500
        eps_scale:
        - 0.52
        - 0.4
        - 0.28
        - 0.18
        min_samples:
        - 110
        - 80
        - 50
        - 25
        max_iter: 4
        kmeans:
          enable: true
          min_size: 500
          min_ratio: 0.06
          min_sep: 0.7
          max_iter: 45
  subsample:
    max_points: 60000
    seed: 123
  normalize_points:
    center:
      enable: true
    scale:
      enable: true
      method: std
      axis_weights:
      - 1.0
      - 1.0
      - 2.0
  merge_small:
    enable: true
    distance: 3.2
data:
  root: data/sample_npz
  manifest: data/manifests/case_catalog.csv
  train_split: train
  val_split: val
  num_workers: 0
  use_cached: true
  cache_to_npz: false
  limit_train_files: 0
  limit_val_files: 0
