model:
  in_channels: 12
  max_points: 40000
  feat:
    knn: 32
    radius_mm: 1.0
    add_curvature: true
    add_normal_var: true
    add_density: true
train:
  batch_size: 12
  lr: 0.0005
  epochs: 16
loss:
  lambda_boundary: 3.5
  lambda_dice: 1.3
  class_weight_bg: 1.0
  class_weight_tooth: 3.5
data:
  root: data/sample_npz
  num_workers: 0
  use_cached: true
  cache_to_npz: false
  limit_train_files: 0
  limit_val_files: 0
  hardcase_roots:
  - data/hardcases
  - data/hardcases_fn
  manual_override_tags: manual_override_pass1
